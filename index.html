<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bro 🐦</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Lilita+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="title"> FLAPPY Murtaza</div>
<div id="gameContainer">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="scoreLive">0</div>
    <div id="bestHud">BEST<b id="bestVal">0</b></div>
  </div>
  <div class="overlay" id="startScreen">
    <div class="ov-title">FLAP YOUR<br>WAY UP! 🚀</div>
    <div class="ov-sub">Space · Click · Tap</div>
    <button class="big-btn" id="startBtn">▶ PLAY</button>
  </div>
  <div class="overlay hidden" id="overScreen">
    <div class="ov-title">💀 GAME OVER Mubashher</div>
    <div class="ov-score">Score &nbsp;<span id="finalScore">0</span></div>
    <div class="ov-score">Best &nbsp;<span id="finalBest">0</span></div>
    <button class="big-btn" id="retryBtn">🔄 RETRY</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
